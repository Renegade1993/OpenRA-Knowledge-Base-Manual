<svg xmlns='http://www.w3.org/2000/svg' width='640' height='840' viewBox='0 0 640 840'>
  <defs>
    <marker id='arrow' markerWidth='10' markerHeight='7' refX='9' refY='3.5' orient='auto' markerUnits='strokeWidth'>
      <polygon points='0 0, 10 3.5, 0 7' fill='#555' />
    </marker>
  </defs>
  <rect width='100%' height='100%' fill='white'/>
  <style>
    text { font-family: 'Segoe UI', Arial, sans-serif; }
  </style>

  <text x='320' y='20' text-anchor='middle' font-size='16' fill='#212121'>MatrixUtils.BooleanBlur</text>
  <rect x='160' y='40' width='320' height='40' rx='5' ry='5' fill='#BBDEFB' stroke='#1565C0' stroke-width='1.5'/>
  <text x='320.0' y='63.25' text-anchor='middle' font-size='13' fill='#212121'>
    <tspan x='320.0' dy='0'>input, radius, threshold, thresholdOutOf</tspan>
  </text>
  <rect x='160' y='100' width='320' height='40' rx='5' ry='5' fill='#ECEFF1' stroke='#455A64' stroke-width='1.5'/>
  <text x='320.0' y='123.25' text-anchor='middle' font-size='13' fill='#212121'>
    <tspan x='320.0' dy='0'>kernelArea = (2?radius + 1)?</tspan>
  </text>
  <rect x='160' y='160' width='320' height='50' rx='5' ry='5' fill='#ECEFF1' stroke='#455A64' stroke-width='1.5'/>
  <text x='320.0' y='180.25' text-anchor='middle' font-size='11' fill='#212121'>
    <tspan x='320.0' dy='0'>trueThreshold = ceil(kernelArea ? threshold / thresholdOutOf)</tspan>
    <tspan x='320.0' dy='15'>falseThreshold = kernelArea - trueThreshold</tspan>
  </text>
  <rect x='160' y='230' width='320' height='40' rx='5' ry='5' fill='#ECEFF1' stroke='#455A64' stroke-width='1.5'/>
  <text x='320.0' y='253.25' text-anchor='middle' font-size='13' fill='#212121'>
    <tspan x='320.0' dy='0'>hTrueCounts = Matrix&lt;int&gt;(input.Size)</tspan>
  </text>
  <rect x='100' y='290' width='440' height='50' rx='5' ry='5' fill='#FFF9C4' stroke='#F57F17' stroke-width='1.5'/>
  <text x='320.0' y='318.25' text-anchor='middle' font-size='13' fill='#212121'>
    <tspan x='320.0' dy='0'>Horizontal pass: for each y, sum input over x ? [-r, r]</tspan>
  </text>
  <rect x='100' y='360' width='440' height='50' rx='5' ry='5' fill='#FFF9C4' stroke='#F57F17' stroke-width='1.5'/>
  <text x='320.0' y='388.25' text-anchor='middle' font-size='13' fill='#212121'>
    <tspan x='320.0' dy='0'>For x = 1..size.X-1: subtract left, add right</tspan>
  </text>
  <rect x='160' y='430' width='320' height='40' rx='5' ry='5' fill='#ECEFF1' stroke='#455A64' stroke-width='1.5'/>
  <text x='320.0' y='453.25' text-anchor='middle' font-size='13' fill='#212121'>
    <tspan x='320.0' dy='0'>output = Matrix&lt;bool&gt;, changes = 0</tspan>
  </text>
  <rect x='100' y='490' width='440' height='50' rx='5' ry='5' fill='#FFF9C4' stroke='#F57F17' stroke-width='1.5'/>
  <text x='320.0' y='518.25' text-anchor='middle' font-size='13' fill='#212121'>
    <tspan x='320.0' dy='0'>Vertical pass: for each x, sum hTrueCounts over y ? [-r, r]</tspan>
  </text>
  <rect x='100' y='560' width='440' height='50' rx='5' ry='5' fill='#FFF9C4' stroke='#F57F17' stroke-width='1.5'/>
  <text x='320.0' y='588.25' text-anchor='middle' font-size='13' fill='#212121'>
    <tspan x='320.0' dy='0'>Set output[x, 0] and count changes</tspan>
  </text>
  <rect x='100' y='630' width='440' height='50' rx='5' ry='5' fill='#FFF9C4' stroke='#F57F17' stroke-width='1.5'/>
  <text x='320.0' y='658.25' text-anchor='middle' font-size='13' fill='#212121'>
    <tspan x='320.0' dy='0'>For y = 1..size.Y-1: subtract top, add bottom</tspan>
  </text>
  <rect x='160' y='700' width='320' height='40' rx='5' ry='5' fill='#BBDEFB' stroke='#1565C0' stroke-width='1.5'/>
  <text x='320.0' y='723.25' text-anchor='middle' font-size='13' fill='#212121'>
    <tspan x='320.0' dy='0'>return (output, changes)</tspan>
  </text>
  <line x1='320' y1='80' x2='320' y2='100' stroke='#555' stroke-width='1.5' marker-end='url(#arrow)'/>
  <line x1='320' y1='140' x2='320' y2='160' stroke='#555' stroke-width='1.5' marker-end='url(#arrow)'/>
  <line x1='320' y1='210' x2='320' y2='230' stroke='#555' stroke-width='1.5' marker-end='url(#arrow)'/>
  <line x1='320' y1='270' x2='320' y2='290' stroke='#555' stroke-width='1.5' marker-end='url(#arrow)'/>
  <line x1='320' y1='340' x2='320' y2='360' stroke='#555' stroke-width='1.5' marker-end='url(#arrow)'/>
  <line x1='320' y1='410' x2='320' y2='430' stroke='#555' stroke-width='1.5' marker-end='url(#arrow)'/>
  <line x1='320' y1='470' x2='320' y2='490' stroke='#555' stroke-width='1.5' marker-end='url(#arrow)'/>
  <line x1='320' y1='540' x2='320' y2='560' stroke='#555' stroke-width='1.5' marker-end='url(#arrow)'/>
  <line x1='320' y1='610' x2='320' y2='630' stroke='#555' stroke-width='1.5' marker-end='url(#arrow)'/>
  <line x1='320' y1='680' x2='320' y2='700' stroke='#555' stroke-width='1.5' marker-end='url(#arrow)'/>
</svg>