<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520">
  <defs>
    <marker id="arrow6" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4a5568"/>
    </marker>
    <filter id="shadow6" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="380" y="32" font-family="Segoe UI, Tahoma, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a202c">Mod SDK Repository Layout</text>
  <text x="380" y="52" font-family="Segoe UI, Tahoma, sans-serif" font-size="12" text-anchor="middle" fill="#4a5568">Mod assets and bootstrap scripts live together; the engine is a pinned external dependency</text>
  
  <!-- Mod repository box -->
  <rect x="80" y="75" width="600" height="400" rx="14" ry="14" fill="#c6f6d5" stroke="#38a169" stroke-width="2" filter="url(#shadow6)"/>
  <text x="120" y="100" font-family="Segoe UI, Tahoma, sans-serif" font-size="14" font-weight="bold" fill="#22543d">mod repository</text>
  
  <!-- mods/ -->
  <rect x="110" y="120" width="160" height="44" rx="8" ry="8" fill="#ffffff" stroke="#38a169" stroke-width="2" filter="url(#shadow6)"/>
  <text x="190" y="140" font-family="Segoe UI, Tahoma, sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#22543d">mods/</text>
  <text x="190" y="155" font-family="Segoe UI, Tahoma, sans-serif" font-size="10" text-anchor="middle" fill="#22543d">assets, rules, maps, mod.yaml</text>
  
  <!-- *.sln -->
  <rect x="110" y="180" width="160" height="44" rx="8" ry="8" fill="#ffffff" stroke="#38a169" stroke-width="2" filter="url(#shadow6)"/>
  <text x="190" y="200" font-family="Segoe UI, Tahoma, sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#22543d">*.sln / *.csproj</text>
  <text x="190" y="215" font-family="Segoe UI, Tahoma, sans-serif" font-size="10" text-anchor="middle" fill="#22543d">custom C# mod assemblies</text>
  
  <!-- mod.config -->
  <rect x="110" y="240" width="160" height="44" rx="8" ry="8" fill="#feebc8" stroke="#dd6b20" stroke-width="2" filter="url(#shadow6)"/>
  <text x="190" y="260" font-family="Segoe UI, Tahoma, sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#7c2d12">mod.config</text>
  <text x="190" y="275" font-family="Segoe UI, Tahoma, sans-serif" font-size="10" text-anchor="middle" fill="#7c2d12">engine version, mod ID, layout</text>
  
  <!-- user.config -->
  <rect x="110" y="300" width="160" height="44" rx="8" ry="8" fill="#ffffff" stroke="#38a169" stroke-width="2" filter="url(#shadow6)"/>
  <text x="190" y="320" font-family="Segoe UI, Tahoma, sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#22543d">user.config</text>
  <text x="190" y="335" font-family="Segoe UI, Tahoma, sans-serif" font-size="10" text-anchor="middle" fill="#22543d">optional developer overrides</text>
  
  <!-- launchers -->
  <rect x="300" y="120" width="180" height="44" rx="8" ry="8" fill="#e9d8fd" stroke="#805ad5" stroke-width="2" filter="url(#shadow6)"/>
  <text x="390" y="140" font-family="Segoe UI, Tahoma, sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#553c9a">launch-game.sh / .cmd</text>
  <text x="390" y="155" font-family="Segoe UI, Tahoma, sans-serif" font-size="10" text-anchor="middle" fill="#553c9a">launcher entry points</text>
  
  <!-- make -->
  <rect x="300" y="180" width="180" height="44" rx="8" ry="8" fill="#e9d8fd" stroke="#805ad5" stroke-width="2" filter="url(#shadow6)"/>
  <text x="390" y="200" font-family="Segoe UI, Tahoma, sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#553c9a">make / Makefile / make.ps1</text>
  <text x="390" y="215" font-family="Segoe UI, Tahoma, sans-serif" font-size="10" text-anchor="middle" fill="#553c9a">build orchestrators</text>
  
  <!-- fetch-engine.sh -->
  <rect x="300" y="240" width="180" height="44" rx="8" ry="8" fill="#e9d8fd" stroke="#805ad5" stroke-width="2" filter="url(#shadow6)"/>
  <text x="390" y="260" font-family="Segoe UI, Tahoma, sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#553c9a">fetch-engine.sh</text>
  <text x="390" y="275" font-family="Segoe UI, Tahoma, sans-serif" font-size="10" text-anchor="middle" fill="#553c9a">engine downloader (Unix)</text>
  
  <!-- engine directory box -->
  <rect x="300" y="310" width="360" height="140" rx="12" ry="12" fill="#bee3f8" stroke="#3182ce" stroke-width="2" filter="url(#shadow6)"/>
  <text x="320" y="330" font-family="Segoe UI, Tahoma, sans-serif" font-size="13" font-weight="bold" fill="#2c5282">engine/</text>
  <text x="480" y="330" font-family="Segoe UI, Tahoma, sans-serif" font-size="11" fill="#2c5282">downloaded, pinned OpenRA engine</text>
  
  <!-- bin/OpenRA.dll -->
  <rect x="320" y="345" width="140" height="40" rx="8" ry="8" fill="#ffffff" stroke="#3182ce" stroke-width="2" filter="url(#shadow6)"/>
  <text x="390" y="362" font-family="Segoe UI, Tahoma, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#2c5282">bin/OpenRA.dll(.exe)</text>
  <text x="390" y="377" font-family="Segoe UI, Tahoma, sans-serif" font-size="10" text-anchor="middle" fill="#2c5282">engine binary</text>
  
  <!-- VERSION -->
  <rect x="320" y="395" width="140" height="40" rx="8" ry="8" fill="#ffffff" stroke="#3182ce" stroke-width="2" filter="url(#shadow6)"/>
  <text x="390" y="412" font-family="Segoe UI, Tahoma, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#2c5282">VERSION</text>
  <text x="390" y="427" font-family="Segoe UI, Tahoma, sans-serif" font-size="10" text-anchor="middle" fill="#2c5282">pinned version string</text>
  
  <!-- engine source / build -->
  <rect x="500" y="345" width="140" height="90" rx="8" ry="8" fill="#ffffff" stroke="#3182ce" stroke-width="2" filter="url(#shadow6)"/>
  <text x="570" y="375" font-family="Segoe UI, Tahoma, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#2c5282">engine source / build system</text>
  <text x="570" y="395" font-family="Segoe UI, Tahoma, sans-serif" font-size="10" text-anchor="middle" fill="#2c5282">make.cmd, .sln, source</text>
  
  <!-- Arrow from config to engine -->
  <path d="M270 262 L290 262 L290 380" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow6)"/>
  <text x="310" y="280" font-family="Segoe UI, Tahoma, sans-serif" font-size="11" fill="#4a5568">points to</text>
  
  <!-- Arrow from launcher to engine -->
  <path d="M390 164 L390 230 L390 310" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow6)"/>
  <text x="410" y="250" font-family="Segoe UI, Tahoma, sans-serif" font-size="11" fill="#4a5568">runs</text>
  
  <!-- Separation banner -->
  <rect x="80" y="470" width="600" height="34" rx="6" ry="6" fill="#e2e8f0" stroke="#4a5568" stroke-width="1"/>
  <text x="380" y="491" font-family="Segoe UI, Tahoma, sans-serif" font-size="11" text-anchor="middle" fill="#1a202c">Core separation: mod repo owns rules &amp; scripts; engine directory owns the pinned engine binary &amp; source</text>
</svg>