<svg xmlns='http://www.w3.org/2000/svg' width='600' height='760' viewBox='0 0 600 760'>
  <defs>
    <marker id='arrow' markerWidth='10' markerHeight='7' refX='9' refY='3.5' orient='auto' markerUnits='strokeWidth'>
      <polygon points='0 0, 10 3.5, 0 7' fill='#555' />
    </marker>
  </defs>
  <rect width='100%' height='100%' fill='white'/>
  <style>
    text { font-family: 'Segoe UI', Arial, sans-serif; }
  </style>

  <text x='300' y='20' text-anchor='middle' font-size='16' fill='#212121'>NoiseUtils.PerlinNoise</text>
  <rect x='180' y='40' width='240' height='40' rx='5' ry='5' fill='#BBDEFB' stroke='#1565C0' stroke-width='1.5'/>
  <text x='300.0' y='63.25' text-anchor='middle' font-size='13' fill='#212121'>
    <tspan x='300.0' dy='0'>random, span</tspan>
  </text>
  <rect x='150' y='100' width='300' height='40' rx='5' ry='5' fill='#ECEFF1' stroke='#455A64' stroke-width='1.5'/>
  <text x='300.0' y='123.25' text-anchor='middle' font-size='13' fill='#212121'>
    <tspan x='300.0' dy='0'>noise = Matrix&lt;int&gt;(span, span)</tspan>
  </text>
  <rect x='190' y='160' width='220' height='40' rx='5' ry='5' fill='#FFF9C4' stroke='#F57F17' stroke-width='1.5'/>
  <text x='300.0' y='183.25' text-anchor='middle' font-size='13' fill='#212121'>
    <tspan x='300.0' dy='0'>for y = 0 to span</tspan>
  </text>
  <rect x='190' y='220' width='220' height='40' rx='5' ry='5' fill='#FFF9C4' stroke='#F57F17' stroke-width='1.5'/>
  <text x='300.0' y='243.25' text-anchor='middle' font-size='13' fill='#212121'>
    <tspan x='300.0' dy='0'>for x = 0 to span</tspan>
  </text>
  <rect x='150' y='280' width='300' height='40' rx='5' ry='5' fill='#ECEFF1' stroke='#455A64' stroke-width='1.5'/>
  <text x='300.0' y='303.25' text-anchor='middle' font-size='13' fill='#212121'>
    <tspan x='300.0' dy='0'>phase = random angle in [0, 1024)</tspan>
  </text>
  <rect x='150' y='340' width='300' height='40' rx='5' ry='5' fill='#ECEFF1' stroke='#455A64' stroke-width='1.5'/>
  <text x='300.0' y='363.25' text-anchor='middle' font-size='13' fill='#212121'>
    <tspan x='300.0' dy='0'>vx = cos(phase), vy = sin(phase)</tspan>
  </text>
  <rect x='130' y='400' width='340' height='110' rx='5' ry='5' fill='#C8E6C9' stroke='#2E7D32' stroke-width='1.5'/>
  <text x='300.0' y='420.25' text-anchor='middle' font-size='11' fill='#212121'>
    <tspan x='300.0' dy='0'>Add dot product to each neighbor</tspan>
    <tspan x='300.0' dy='15'></tspan>
    <tspan x='300.0' dy='15'>(x&gt;0,y&gt;0): -vx - vy</tspan>
    <tspan x='300.0' dy='15'>(x&lt;span,y&gt;0):  vx - vy</tspan>
    <tspan x='300.0' dy='15'>(x&gt;0,y&lt;span): -vx + vy</tspan>
    <tspan x='300.0' dy='15'>(x&lt;span,y&lt;span): vx + vy</tspan>
  </text>
  <rect x='190' y='540' width='220' height='40' rx='5' ry='5' fill='#FFF9C4' stroke='#F57F17' stroke-width='1.5'/>
  <text x='300.0' y='563.25' text-anchor='middle' font-size='13' fill='#212121'>
    <tspan x='300.0' dy='0'>end x / end y</tspan>
  </text>
  <rect x='180' y='600' width='240' height='40' rx='5' ry='5' fill='#BBDEFB' stroke='#1565C0' stroke-width='1.5'/>
  <text x='300.0' y='623.25' text-anchor='middle' font-size='13' fill='#212121'>
    <tspan x='300.0' dy='0'>return noise</tspan>
  </text>
  <line x1='300' y1='80' x2='300' y2='100' stroke='#555' stroke-width='1.5' marker-end='url(#arrow)'/>
  <line x1='300' y1='140' x2='300' y2='160' stroke='#555' stroke-width='1.5' marker-end='url(#arrow)'/>
  <line x1='300' y1='200' x2='300' y2='220' stroke='#555' stroke-width='1.5' marker-end='url(#arrow)'/>
  <line x1='300' y1='260' x2='300' y2='280' stroke='#555' stroke-width='1.5' marker-end='url(#arrow)'/>
  <line x1='300' y1='320' x2='300' y2='340' stroke='#555' stroke-width='1.5' marker-end='url(#arrow)'/>
  <line x1='300' y1='380' x2='300' y2='400' stroke='#555' stroke-width='1.5' marker-end='url(#arrow)'/>
  <line x1='300' y1='510' x2='300' y2='540' stroke='#555' stroke-width='1.5' marker-end='url(#arrow)'/>
  <line x1='300' y1='580' x2='300' y2='600' stroke='#555' stroke-width='1.5' marker-end='url(#arrow)'/>
</svg>