<svg xmlns="http://www.w3.org/2000/svg" width="540" height="220" viewBox="0 0 540 220">
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4a5568"/>
    </marker>
    <filter id="shadow2" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="270" y="30" font-family="Segoe UI, Tahoma, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a202c">Actor Delegates to Cached Trait Interfaces</text>
  
  <!-- Left column: Tick -->
  <text x="130" y="70" font-family="Segoe UI, Tahoma, sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#2c5282">Actor.Tick()</text>
  <line x1="130" y1="78" x2="130" y2="110" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow2)"/>
  
  <rect x="40" y="115" width="180" height="70" rx="8" ry="8" fill="#fed7e2" stroke="#d53f8c" stroke-width="2" filter="url(#shadow2)"/>
  <text x="130" y="140" font-family="Segoe UI, Tahoma, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#97266d">foreach ITick t</text>
  <text x="130" y="160" font-family="Segoe UI, Tahoma, sans-serif" font-size="12" text-anchor="middle" fill="#97266d">t.Tick(this)</text>
  <text x="130" y="176" font-family="Segoe UI, Tahoma, sans-serif" font-size="11" text-anchor="middle" fill="#97266d">update state, queue activities</text>
  
  <!-- Right column: Render -->
  <text x="410" y="70" font-family="Segoe UI, Tahoma, sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#2c5282">Actor.Render()</text>
  <line x1="410" y1="78" x2="410" y2="110" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow2)"/>
  
  <rect x="320" y="115" width="180" height="70" rx="8" ry="8" fill="#c6f6d5" stroke="#38a169" stroke-width="2" filter="url(#shadow2)"/>
  <text x="410" y="140" font-family="Segoe UI, Tahoma, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#22543d">foreach IRender r</text>
  <text x="410" y="160" font-family="Segoe UI, Tahoma, sans-serif" font-size="12" text-anchor="middle" fill="#22543d">r.Render(this)</text>
  <text x="410" y="176" font-family="Segoe UI, Tahoma, sans-serif" font-size="11" text-anchor="middle" fill="#22543d">produce renderables</text>
  
  <!-- Shared actor container -->
  <rect x="190" y="165" width="160" height="40" rx="8" ry="8" fill="#bee3f8" stroke="#3182ce" stroke-width="2" filter="url(#shadow2)"/>
  <text x="270" y="182" font-family="Segoe UI, Tahoma, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#2c5282">Actor container</text>
  <text x="270" y="198" font-family="Segoe UI, Tahoma, sans-serif" font-size="10" text-anchor="middle" fill="#2c5282">cached interface arrays</text>
</svg>