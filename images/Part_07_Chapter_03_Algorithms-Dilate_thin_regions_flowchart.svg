<svg xmlns='http://www.w3.org/2000/svg' width='640' height='860' viewBox='0 0 640 860'>
  <defs>
    <marker id='arrow' markerWidth='10' markerHeight='7' refX='9' refY='3.5' orient='auto' markerUnits='strokeWidth'>
      <polygon points='0 0, 10 3.5, 0 7' fill='#555' />
    </marker>
  </defs>
  <rect width='100%' height='100%' fill='white'/>
  <style>
    text { font-family: 'Segoe UI', Arial, sans-serif; }
  </style>

  <text x='320' y='20' text-anchor='middle' font-size='16' fill='#212121'>MatrixUtils.DilateThinRegionsInPlace</text>
  <rect x='160' y='40' width='320' height='40' rx='5' ry='5' fill='#BBDEFB' stroke='#1565C0' stroke-width='1.5'/>
  <text x='320.0' y='63.25' text-anchor='middle' font-size='13' fill='#212121'>
    <tspan x='320.0' dy='0'>input, foreground, width</tspan>
  </text>
  <rect x='140' y='100' width='360' height='50' rx='5' ry='5' fill='#ECEFF1' stroke='#455A64' stroke-width='1.5'/>
  <text x='320.0' y='120.25' text-anchor='middle' font-size='11' fill='#212121'>
    <tspan x='320.0' dy='0'>cornerMask[x, y] = 1 + width + width - x - y</tspan>
    <tspan x='320.0' dy='15'>cornerMask[0, 0] = 0</tspan>
  </text>
  <rect x='160' y='170' width='320' height='40' rx='5' ry='5' fill='#ECEFF1' stroke='#455A64' stroke-width='1.5'/>
  <text x='320.0' y='193.25' text-anchor='middle' font-size='13' fill='#212121'>
    <tspan x='320.0' dy='0'>thinness = Matrix(input.Size).fill(0)</tspan>
  </text>
  <rect x='180' y='230' width='280' height='40' rx='5' ry='5' fill='#FFF9C4' stroke='#F57F17' stroke-width='1.5'/>
  <text x='320.0' y='253.25' text-anchor='middle' font-size='13' fill='#212121'>
    <tspan x='320.0' dy='0'>for each cell (cx, cy)</tspan>
  </text>
  <polygon points='320.0,290 440,320.0 320.0,350 200,320.0' fill='#FFE0B2' stroke='#E65100' stroke-width='1.5'/>
  <text x='320.0' y='324.0' text-anchor='middle' font-size='12' fill='#212121'>input == foreground?</text>
  <rect x='160' y='380' width='320' height='40' rx='5' ry='5' fill='#ECEFF1' stroke='#455A64' stroke-width='1.5'/>
  <text x='320.0' y='403.25' text-anchor='middle' font-size='13' fill='#212121'>
    <tspan x='320.0' dy='0'>Read L, R, U, D neighbors</tspan>
  </text>
  <rect x='120' y='450' width='400' height='60' rx='5' ry='5' fill='#C8E6C9' stroke='#2E7D32' stroke-width='1.5'/>
  <text x='320.0' y='475.25' text-anchor='middle' font-size='11' fill='#212121'>
    <tspan x='320.0' dy='0'>For each combination, propagate thinness</tspan>
    <tspan x='320.0' dy='15'>to cells in [0, width] quadrants</tspan>
  </text>
  <rect x='160' y='540' width='320' height='40' rx='5' ry='5' fill='#ECEFF1' stroke='#455A64' stroke-width='1.5'/>
  <text x='320.0' y='563.25' text-anchor='middle' font-size='13' fill='#212121'>
    <tspan x='320.0' dy='0'>thinnest = max(thinness)</tspan>
  </text>
  <polygon points='320.0,600 440,630.0 320.0,660 200,630.0' fill='#FFE0B2' stroke='#E65100' stroke-width='1.5'/>
  <text x='320.0' y='634.0' text-anchor='middle' font-size='12' fill='#212121'>thinnest == 0?</text>
  <rect x='460' y='620' width='120' height='40' rx='5' ry='5' fill='#BBDEFB' stroke='#1565C0' stroke-width='1.5'/>
  <text x='520.0' y='643.25' text-anchor='middle' font-size='13' fill='#212121'>
    <tspan x='520.0' dy='0'>return 0</tspan>
  </text>
  <rect x='120' y='690' width='400' height='50' rx='5' ry='5' fill='#C8E6C9' stroke='#2E7D32' stroke-width='1.5'/>
  <text x='320.0' y='710.25' text-anchor='middle' font-size='11' fill='#212121'>
    <tspan x='320.0' dy='0'>For each cell with thinness == thinnest:</tspan>
    <tspan x='320.0' dy='15'>set input = foreground, changes++</tspan>
  </text>
  <rect x='200' y='770' width='240' height='40' rx='5' ry='5' fill='#BBDEFB' stroke='#1565C0' stroke-width='1.5'/>
  <text x='320.0' y='793.25' text-anchor='middle' font-size='13' fill='#212121'>
    <tspan x='320.0' dy='0'>return changes</tspan>
  </text>
  <line x1='320' y1='80' x2='320' y2='100' stroke='#555' stroke-width='1.5' marker-end='url(#arrow)'/>
  <line x1='320' y1='150' x2='320' y2='170' stroke='#555' stroke-width='1.5' marker-end='url(#arrow)'/>
  <line x1='320' y1='210' x2='320' y2='230' stroke='#555' stroke-width='1.5' marker-end='url(#arrow)'/>
  <line x1='320' y1='270' x2='320' y2='290' stroke='#555' stroke-width='1.5' marker-end='url(#arrow)'/>
  <path d='M 440 320 C 580 320 580 230 320 230' stroke='#555' stroke-width='1.5' fill='none' marker-end='url(#arrow)'/>
  <text x='510' y='285' text-anchor='start' font-size='11' fill='#444'>Yes (continue)</text>
  <line x1='320' y1='350' x2='320' y2='380' stroke='#555' stroke-width='1.5' marker-end='url(#arrow)'/>
  <text x='330' y='365' text-anchor='start' font-size='11' fill='#444'>No</text>
  <line x1='320' y1='420' x2='320' y2='450' stroke='#555' stroke-width='1.5' marker-end='url(#arrow)'/>
  <line x1='320' y1='510' x2='320' y2='540' stroke='#555' stroke-width='1.5' marker-end='url(#arrow)'/>
  <line x1='320' y1='580' x2='320' y2='600' stroke='#555' stroke-width='1.5' marker-end='url(#arrow)'/>
  <line x1='440' y1='630' x2='460' y2='640' stroke='#555' stroke-width='1.5' marker-end='url(#arrow)'/>
  <text x='450' y='615' text-anchor='middle' font-size='11' fill='#444'>Yes</text>
  <line x1='320' y1='660' x2='320' y2='690' stroke='#555' stroke-width='1.5' marker-end='url(#arrow)'/>
  <text x='330' y='675' text-anchor='start' font-size='11' fill='#444'>No</text>
  <line x1='320' y1='740' x2='320' y2='770' stroke='#555' stroke-width='1.5' marker-end='url(#arrow)'/>
</svg>