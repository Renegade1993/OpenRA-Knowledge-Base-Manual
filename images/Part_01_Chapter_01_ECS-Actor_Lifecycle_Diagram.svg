<svg xmlns="http://www.w3.org/2000/svg" width="520" height="760" viewBox="0 0 520 760">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4a5568"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="260" y="36" font-family="Segoe UI, Tahoma, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a202c">Actor Lifecycle</text>
  
  <!-- YAML Rules box -->
  <rect x="140" y="60" width="240" height="50" rx="8" ry="8" fill="#e2e8f0" stroke="#4a5568" stroke-width="2" filter="url(#shadow)"/>
  <text x="260" y="85" font-family="Segoe UI, Tahoma, sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#1a202c">ActorInfo (YAML rules)</text>
  <text x="260" y="102" font-family="Segoe UI, Tahoma, sans-serif" font-size="11" text-anchor="middle" fill="#4a5568">immutable TraitInfo objects</text>
  
  <!-- Arrow 1 -->
  <line x1="260" y1="110" x2="260" y2="145" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="320" y="132" font-family="Segoe UI, Tahoma, sans-serif" font-size="11" fill="#4a5568">TraitInfo[]</text>
  
  <!-- new Actor() box -->
  <rect x="160" y="150" width="200" height="50" rx="8" ry="8" fill="#bee3f8" stroke="#3182ce" stroke-width="2" filter="url(#shadow)"/>
  <text x="260" y="175" font-family="Segoe UI, Tahoma, sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#2c5282">new Actor()</text>
  <text x="260" y="192" font-family="Segoe UI, Tahoma, sans-serif" font-size="11" text-anchor="middle" fill="#2c5282">empty container + init bag</text>
  
  <!-- Arrow 2 -->
  <line x1="260" y1="200" x2="260" y2="235" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="330" y="222" font-family="Segoe UI, Tahoma, sans-serif" font-size="11" fill="#4a5568">Create() in order</text>
  
  <!-- Trait instances box -->
  <rect x="150" y="240" width="220" height="60" rx="8" ry="8" fill="#c6f6d5" stroke="#38a169" stroke-width="2" filter="url(#shadow)"/>
  <text x="260" y="265" font-family="Segoe UI, Tahoma, sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#22543d">Trait instances</text>
  <text x="260" y="282" font-family="Segoe UI, Tahoma, sans-serif" font-size="11" text-anchor="middle" fill="#22543d">per-actor, mutable runtime state</text>
  <text x="260" y="297" font-family="Segoe UI, Tahoma, sans-serif" font-size="11" text-anchor="middle" fill="#22543d">(IOccupySpace, IFacing, IHealth ...)</text>
  
  <!-- Arrow 3 -->
  <line x1="260" y1="300" x2="260" y2="335" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="330" y="322" font-family="Segoe UI, Tahoma, sans-serif" font-size="11" fill="#4a5568">INotifyCreated</text>
  
  <!-- Created hook box -->
  <rect x="160" y="340" width="200" height="50" rx="8" ry="8" fill="#feebc8" stroke="#dd6b20" stroke-width="2" filter="url(#shadow)"/>
  <text x="260" y="365" font-family="Segoe UI, Tahoma, sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#7c2d12">Trait.Created()</text>
  <text x="260" y="382" font-family="Segoe UI, Tahoma, sans-serif" font-size="11" text-anchor="middle" fill="#7c2d12">first safe cross-trait access</text>
  
  <!-- Arrow 4 -->
  <line x1="260" y1="390" x2="260" y2="425" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="320" y="412" font-family="Segoe UI, Tahoma, sans-serif" font-size="11" fill="#4a5568">addToWorld</text>
  
  <!-- World.Add box -->
  <rect x="160" y="430" width="200" height="50" rx="8" ry="8" fill="#e9d8fd" stroke="#805ad5" stroke-width="2" filter="url(#shadow)"/>
  <text x="260" y="455" font-family="Segoe UI, Tahoma, sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#553c9a">World.Add()</text>
  <text x="260" y="472" font-family="Segoe UI, Tahoma, sans-serif" font-size="11" text-anchor="middle" fill="#553c9a">spatial index + INotifyAddedToWorld</text>
  
  <!-- Arrow 5 -->
  <line x1="260" y1="480" x2="260" y2="515" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="320" y="502" font-family="Segoe UI, Tahoma, sans-serif" font-size="11" fill="#4a5568">each frame</text>
  
  <!-- Tick/Render/Input box -->
  <rect x="130" y="520" width="260" height="70" rx="8" ry="8" fill="#fed7e2" stroke="#d53f8c" stroke-width="2" filter="url(#shadow)"/>
  <text x="260" y="545" font-family="Segoe UI, Tahoma, sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#97266d">Tick / Render / Input / ResolveOrder</text>
  <text x="260" y="562" font-family="Segoe UI, Tahoma, sans-serif" font-size="11" text-anchor="middle" fill="#97266d">Actor iterates cached interface arrays</text>
  <text x="260" y="579" font-family="Segoe UI, Tahoma, sans-serif" font-size="11" text-anchor="middle" fill="#97266d">and delegates to matching traits</text>
  
  <!-- Arrow 6 -->
  <line x1="260" y1="590" x2="260" y2="625" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="330" y="612" font-family="Segoe UI, Tahoma, sans-serif" font-size="11" fill="#4a5568">Death / Dispose</text>
  
  <!-- World.Remove/Disposal box -->
  <rect x="140" y="630" width="240" height="60" rx="8" ry="8" fill="#e2e8f0" stroke="#4a5568" stroke-width="2" filter="url(#shadow)"/>
  <text x="260" y="655" font-family="Segoe UI, Tahoma, sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#1a202c">World.Remove() / Disposal</text>
  <text x="260" y="672" font-family="Segoe UI, Tahoma, sans-serif" font-size="11" text-anchor="middle" fill="#4a5568">deferred to frame end</text>
  <text x="260" y="687" font-family="Segoe UI, Tahoma, sans-serif" font-size="11" text-anchor="middle" fill="#4a5568">INotifyActorDisposing + TraitDict.RemoveActor</text>
  
  <!-- Legend -->
  <rect x="40" y="710" width="440" height="38" rx="6" ry="6" fill="#ffffff" stroke="#cbd5e0" stroke-width="1"/>
  <text x="260" y="728" font-family="Segoe UI, Tahoma, sans-serif" font-size="11" text-anchor="middle" fill="#4a5568">Info tier (immutable) → Instance tier (mutable) → Hook → World loop → Cleanup</text>
  <text x="260" y="743" font-family="Segoe UI, Tahoma, sans-serif" font-size="10" text-anchor="middle" fill="#718096">Color key: gray = rules, blue = actor, green = traits, orange = hooks, purple = world, pink = loops</text>
</svg>